<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shelter Export</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 280px;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #login-btn { background: #0079c1; color: white; }
    #login-btn:hover:not(:disabled) { background: #005e95; }
    #login-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    #open-btn { background: #0079c1; color: white; }
    #open-btn:hover:not(:disabled) { background: #005e95; }
    #open-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    #logout-btn {
      background: none;
      color: #6b7280;
      font-size: 12px;
      font-weight: 400;
      padding: 4px 8px;
      width: auto;
      border: none;
      text-decoration: underline;
      cursor: pointer;
    }
    #logout-btn:hover { color: #374151; }

    #status {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      line-height: 1.4;
      min-height: 16px;
    }
    #status.error   { color: #dc2626; }
    #status.success { color: #16a34a; }

    .user-info {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrapper">
  <div id="status"></div>

  <button id="login-btn">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M7.5 1a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 9.5c3.5 0 6 1.8 6 2.5v.5H1.5V13c0-.7 2.5-2.5 6-2.5z" fill="white"/>
    </svg>
    Sign in to Download
  </button>

  <div id="user-info" class="user-info" style="display:none"></div>

  <button id="open-btn" style="display:none">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M7.5 1v9M3.5 7l4 4 4-4M1.5 13h12" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Open Download Tool
  </button>

  <button id="logout-btn" style="display:none">Sign out</button>
</div>

<script>
// =============================================
// CONFIGURATION
// =============================================
const CONFIG = {
  clientId:       "JZeMzScpk6eh6BPR",
  redirectUri:    "https://aspraggins.github.io/shelter_export/oauth-callback.html",
  portalUrl:      "https://www.arcgis.com",
  downloadAppUrl: "https://aspraggins.github.io/shelter_export/download-app.html"
};
// =============================================

const loginBtn  = document.getElementById("login-btn");
const openBtn   = document.getElementById("open-btn");
const logoutBtn = document.getElementById("logout-btn");
const statusEl  = document.getElementById("status");
const userInfoEl= document.getElementById("user-info");

// --- Token helpers ---
function saveToken(token, expires, username) {
  sessionStorage.setItem("agol_token",    token);
  sessionStorage.setItem("agol_expires",  expires);
  sessionStorage.setItem("agol_username", username);
}
function getToken() {
  const token   = sessionStorage.getItem("agol_token");
  const expires = parseInt(sessionStorage.getItem("agol_expires") || "0", 10);
  if (!token) return null;
  if (expires && Date.now() > expires) { clearToken(); return null; }
  return token;
}
function getUsername() { return sessionStorage.getItem("agol_username") || ""; }
function clearToken() {
  sessionStorage.removeItem("agol_token");
  sessionStorage.removeItem("agol_expires");
  sessionStorage.removeItem("agol_username");
}

// --- UI ---
function showLoggedIn() {
  loginBtn.style.display  = "none";
  openBtn.style.display   = "";
  logoutBtn.style.display = "";
  userInfoEl.style.display= "";
  userInfoEl.textContent  = `Signed in as ${getUsername()}`;
}
function showLoggedOut() {
  loginBtn.style.display  = "";
  openBtn.style.display   = "none";
  logoutBtn.style.display = "none";
  userInfoEl.style.display= "none";
  setStatus("", "");
}
function setStatus(type, msg) {
  statusEl.className   = type;
  statusEl.textContent = msg;
}

// --- OAuth popup ---
let authPopup = null;

loginBtn.addEventListener("click", function() {
  const params = new URLSearchParams({
    client_id:     CONFIG.clientId,
    response_type: "token",
    redirect_uri:  CONFIG.redirectUri,
    expiration:    "120"
  });
  const authUrl = `${CONFIG.portalUrl}/sharing/rest/oauth2/authorize?${params.toString()}`;
  const w = 500, h = 600;
  const left = Math.round(window.screen.width  / 2 - w / 2);
  const top  = Math.round(window.screen.height / 2 - h / 2);
  authPopup = window.open(authUrl, "agol_auth", `width=${w},height=${h},left=${left},top=${top},toolbar=no,menubar=no`);

  if (!authPopup) {
    setStatus("error", "Popup blocked — please allow popups for this page.");
    return;
  }
  loginBtn.disabled = true;
  setStatus("", "Waiting for sign in…");
});

window.addEventListener("message", function(event) {
  if (event.origin !== "https://aspraggins.github.io") return;
  if (!event.data || event.data.type !== "agol_token") return;

  const { token, expires, username } = event.data;
  saveToken(token, expires, username);
  if (authPopup) { authPopup.close(); authPopup = null; }
  loginBtn.disabled = false;
  showLoggedIn();
  setStatus("success", "Signed in successfully.");
});

logoutBtn.addEventListener("click", function() { clearToken(); showLoggedOut(); });

// --- Open download app, passing token in hash ---
openBtn.addEventListener("click", function() {
  const token   = getToken();
  if (!token) { clearToken(); showLoggedOut(); return; }

  const expires  = sessionStorage.getItem("agol_expires");
  const username = getUsername();

  // Pass token via hash — download app strips it from URL immediately on load
  const url = `${CONFIG.downloadAppUrl}#token=${encodeURIComponent(token)}&expires=${expires}&username=${encodeURIComponent(username)}`;
  window.open(url, "_blank");
});

// --- Init ---
if (getToken()) showLoggedIn();
else showLoggedOut();
</script>
</body>
</html>
