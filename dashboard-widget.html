<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download Data</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 280px;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #login-btn { background: #0079c1; color: white; }
    #login-btn:hover:not(:disabled) { background: #005e95; }
    #login-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    #download-btn { background: #0079c1; color: white; }
    #download-btn:hover:not(:disabled) { background: #005e95; }
    #download-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    #logout-btn {
      background: none;
      color: #6b7280;
      font-size: 12px;
      font-weight: 400;
      padding: 4px 8px;
      width: auto;
      border: none;
      text-decoration: underline;
      cursor: pointer;
    }
    #logout-btn:hover { color: #374151; }

    #status {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      line-height: 1.4;
      min-height: 16px;
    }
    #status.error   { color: #dc2626; }
    #status.success { color: #16a34a; }
    #status.warn    { color: #d97706; }

    .user-info {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }

    .progress-wrap {
      width: 100%;
      background: #e5e7eb;
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #0079c1;
      width: 0%;
      transition: width 0.3s;
    }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrapper">
  <div id="status"></div>

  <button id="login-btn">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M7.5 1a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 9.5c3.5 0 6 1.8 6 2.5v.5H1.5V13c0-.7 2.5-2.5 6-2.5z" fill="white"/>
    </svg>
    Sign in to Download
  </button>

  <div id="user-info" class="user-info" style="display:none"></div>

  <button id="download-btn" style="display:none">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M7.5 1v9M3.5 7l4 4 4-4M1.5 13h12" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Download CSV
  </button>

  <button id="logout-btn" style="display:none">Sign out</button>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</div>

<script>
// =============================================
// CONFIGURATION — edit these values
// =============================================
const CONFIG = {
  clientId:          "JZeMzScpk6eh6BPR",
  redirectUri:       "https://aspraggins.github.io/shelter_export/oauth-callback.html",
  portalUrl:         "https://www.arcgis.com",

  featureServiceUrl: "https://services1.arcgis.com/kILp9lqGUeOhnDbI/ArcGIS/rest/services/service_570f1aad0c2641e7beac6dfca700747e/FeatureServer/0",
  exportFilename:    "export",
  pageSize:          2000,

  // Fields to include in export
  // key = actual field name, value = CSV column header
  // Fields NOT listed here are excluded (globalid, objectid, etc.)
  fields: {
    "incident_type":  "Incident Type",
    "report_date":    "Report Date",
    "location_desc":  "Location",
    "status":         "Status",
    "notes":          "Notes"
  }
};
// =============================================

const loginBtn     = document.getElementById("login-btn");
const downloadBtn  = document.getElementById("download-btn");
const logoutBtn    = document.getElementById("logout-btn");
const statusEl     = document.getElementById("status");
const userInfoEl   = document.getElementById("user-info");
const progressWrap = document.getElementById("progress-wrap");
const progressBar  = document.getElementById("progress-bar");

// --- Token helpers ---
function saveToken(token, expires, username) {
  sessionStorage.setItem("agol_token",    token);
  sessionStorage.setItem("agol_expires",  expires);
  sessionStorage.setItem("agol_username", username);
}
function getToken() {
  const token   = sessionStorage.getItem("agol_token");
  const expires = parseInt(sessionStorage.getItem("agol_expires") || "0", 10);
  if (!token) return null;
  if (expires && Date.now() > expires) { clearToken(); return null; }
  return token;
}
function getUsername() { return sessionStorage.getItem("agol_username") || ""; }
function clearToken() {
  sessionStorage.removeItem("agol_token");
  sessionStorage.removeItem("agol_expires");
  sessionStorage.removeItem("agol_username");
}

// --- UI helpers ---
function showLoggedIn() {
  loginBtn.style.display    = "none";
  downloadBtn.style.display = "";
  logoutBtn.style.display   = "";
  userInfoEl.style.display  = "";
  userInfoEl.textContent    = `Signed in as ${getUsername()}`;
}
function showLoggedOut() {
  loginBtn.style.display    = "";
  downloadBtn.style.display = "none";
  logoutBtn.style.display   = "none";
  userInfoEl.style.display  = "none";
  setStatus("", "");
}
function setStatus(type, msg) {
  statusEl.className   = type;
  statusEl.textContent = msg;
}
function setProgress(pct) {
  progressWrap.style.display = pct > 0 ? "block" : "none";
  progressBar.style.width    = pct + "%";
}

// --- OAuth popup ---
let authPopup = null;

function openAuthPopup() {
  const params = new URLSearchParams({
    client_id:     CONFIG.clientId,
    response_type: "token",
    redirect_uri:  CONFIG.redirectUri,
    expiration:    "120"
  });
  const authUrl = `${CONFIG.portalUrl}/sharing/rest/oauth2/authorize?${params.toString()}`;

  // Open popup centered on screen
  const w = 500, h = 600;
  const left = Math.round(window.screen.width  / 2 - w / 2);
  const top  = Math.round(window.screen.height / 2 - h / 2);
  authPopup = window.open(
    authUrl,
    "agol_auth",
    `width=${w},height=${h},left=${left},top=${top},toolbar=no,menubar=no`
  );

  if (!authPopup) {
    setStatus("error", "Popup was blocked. Please allow popups for this page.");
    return;
  }

  loginBtn.disabled = true;
  setStatus("", "Waiting for sign in…");
}

// Listen for token message from the callback popup
window.addEventListener("message", function(event) {
  // Only accept messages from our own origin
  if (event.origin !== "https://aspraggins.github.io") return;
  if (!event.data || event.data.type !== "agol_token") return;

  const { token, expires, username } = event.data;
  saveToken(token, expires, username);

  if (authPopup) { authPopup.close(); authPopup = null; }

  loginBtn.disabled = false;
  showLoggedIn();
  setStatus("success", "Signed in successfully.");
});

loginBtn.addEventListener("click", openAuthPopup);

logoutBtn.addEventListener("click", function() {
  clearToken();
  showLoggedOut();
});

// --- Feature service fetch with pagination ---
async function fetchAllFeatures(token) {
  const outFields = Object.keys(CONFIG.fields).join(",");

  const countUrl = new URL(CONFIG.featureServiceUrl + "/query");
  countUrl.searchParams.set("where",           "1=1");
  countUrl.searchParams.set("returnCountOnly",  "true");
  countUrl.searchParams.set("f",                "json");
  countUrl.searchParams.set("token",            token);
  const countData = await (await fetch(countUrl.toString())).json();
  if (countData.error) throw new Error(countData.error.message);
  const total = countData.count || 0;

  let allFeatures = [], offset = 0;

  while (true) {
    const url = new URL(CONFIG.featureServiceUrl + "/query");
    url.searchParams.set("where",             "1=1");
    url.searchParams.set("outFields",         outFields);
    url.searchParams.set("returnGeometry",    "false");
    url.searchParams.set("resultOffset",      offset);
    url.searchParams.set("resultRecordCount", CONFIG.pageSize);
    url.searchParams.set("f",                 "json");
    url.searchParams.set("token",             token);

    const data = await (await fetch(url.toString())).json();
    if (data.error) throw new Error(data.error.message);

    const features = data.features || [];
    allFeatures = allFeatures.concat(features);
    setProgress(Math.min(90, Math.round((allFeatures.length / Math.max(total, 1)) * 90)));

    if (!data.exceededTransferLimit && features.length < CONFIG.pageSize) break;
    offset += features.length;
    if (offset >= total) break;
  }

  return { features: allFeatures, total };
}

// --- CSV export ---
function exportCSV(features) {
  const fieldKeys   = Object.keys(CONFIG.fields);
  const fieldLabels = Object.values(CONFIG.fields);

  const rows = features.map(f =>
    fieldKeys.reduce((obj, key, i) => {
      obj[fieldLabels[i]] = f.attributes[key] ?? "";
      return obj;
    }, {})
  );

  const csv  = Papa.unparse(rows, { columns: fieldLabels });
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = CONFIG.exportFilename + ".csv";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// --- Download handler ---
downloadBtn.addEventListener("click", async function() {
  const token = getToken();
  if (!token) { clearToken(); showLoggedOut(); return; }

  downloadBtn.disabled  = true;
  downloadBtn.innerHTML = '<div class="spinner"></div> Fetching…';
  setProgress(5);
  setStatus("", "");

  try {
    const { features } = await fetchAllFeatures(token);

    if (features.length === 0) {
      setStatus("warn", "No records found.");
      setProgress(0);
      return;
    }

    exportCSV(features);
    setProgress(100);
    setStatus("success", `✓ ${features.length.toLocaleString()} records downloaded.`);
    setTimeout(() => setProgress(0), 2000);

  } catch(err) {
    console.error(err);
    if (err.message?.includes("498") || err.message?.includes("499") || err.message?.toLowerCase().includes("token")) {
      clearToken(); showLoggedOut();
      setStatus("error", "Session expired — please sign in again.");
    } else {
      setStatus("error", "Error: " + err.message);
    }
    setProgress(0);
  } finally {
    downloadBtn.disabled  = false;
    downloadBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M7.5 1v9M3.5 7l4 4 4-4M1.5 13h12" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg> Download CSV`;
  }
});

// --- Init ---
if (getToken()) showLoggedIn();
else showLoggedOut();
</script>
</body>
</html>
