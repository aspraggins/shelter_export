
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Signing in…</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f6f8;
      color: #374151;
      font-size: 14px;
    }
    .msg { text-align: center; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #0079c1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <div id="msg">Completing sign in…</div>
  </div>

  <script>
    (function() {
      const hash = window.location.hash;

      if (!hash || !hash.includes("access_token")) {
        document.getElementById("msg").textContent = "Sign in failed — no token received.";
        return;
      }

      const params    = new URLSearchParams(hash.replace("#", ""));
      const token     = params.get("access_token");
      const expiresIn = parseInt(params.get("expires_in") || "7200", 10);
      const username  = params.get("username") || "";
      const expires   = Date.now() + expiresIn * 1000;

      if (!token) {
        document.getElementById("msg").textContent = "Sign in failed — could not read token.";
        return;
      }

      // Send token back to the opener (the widget iframe)
      if (window.opener) {
        window.opener.postMessage(
          { type: "agol_token", token, expires, username },
          "https://aspraggins.github.io"
        );
        document.getElementById("msg").textContent = "Signed in! This window will close…";
        setTimeout(() => window.close(), 1000);
      } else {
        document.getElementById("msg").textContent = "Signed in but could not return to the app. Please close this window.";
      }
    })();
  </script>
</body>
</html>
